name: Weekly SERP Data Fetch

on:
  schedule:
    # Her Pazartesi 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Manuel tetikleme — GitHub Actions UI'dan "Run workflow" butonu

jobs:
  fetch-serp:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Write SerpAPI key to config
        run: |
          echo "SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}" > growth-agent/config-whattime.env

      - name: Run SERP batch fetch
        run: |
          cd growth-agent
          python3 serp_batch_fetch.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seo-intel/serp_results.json
          git diff --staged --quiet || git commit -m "chore: weekly SERP data update $(date +%Y-%m-%d)"
          git push
